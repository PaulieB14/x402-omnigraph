specVersion: 1.0.0
description: x402 payment protocol subgraph — base
repository: https://github.com/your-org/x402-subgraph
schema:
  file: ./schema.graphql

indexerHints:
  prune: auto

# graft:
#   base: QmPreviousDeploymentId
#   block: 12345678

dataSources:

  # ── 1. FacilitatorRegistry ──────────────────────────────────────────────────
  - kind: ethereum
    name: FacilitatorRegistry
    network: base
    source:
      address: "0x67C75c4FD5BbbF5f6286A1874fe2d7dF0024Ebe8"
      abi: FacilitatorRegistry
      startBlock: 30011612
    mapping:
      kind: ethereum/events
      apiVersion: 0.0.7
      language: wasm/assemblyscript
      entities:
        - Facilitator
      abis:
        - name: FacilitatorRegistry
          file: ./abis/FacilitatorRegistry.json
      eventHandlers:
        - event: FacilitatorAdded(indexed address,string,string,uint256)
          handler: handleFacilitatorAdded
        - event: FacilitatorRemoved(indexed address,uint256)
          handler: handleFacilitatorRemoved
      file: ./src/registry.ts

  # ── 2. USDC — EIP-3009 path ─────────────────────────────────────────────────
  - kind: ethereum
    name: USDC
    network: base
    source:
      address: "0x833589fCD6eDb6E08f4c7C32D4f71b54bdA02913"
      abi: FiatTokenV2_2
      startBlock: 30011612
    mapping:
      kind: ethereum/events
      apiVersion: 0.0.7
      language: wasm/assemblyscript
      entities:
        - X402Payment
        - X402AddressSummary
        - X402DailyStats
        - Facilitator
      abis:
        - name: FiatTokenV2_2
          file: ./abis/FiatTokenV2_2.json
      eventHandlers:
        - event: AuthorizationUsed(indexed address,indexed bytes32)
          handler: handleAuthorizationUsed
          receipt: true
      file: ./src/usdc.ts

  # ── 3. x402ExactPermit2Proxy — Permit2 path ─────────────────────────────────
  - kind: ethereum
    name: x402Permit2Proxy
    network: base
    source:
      address: "0x402085c248EeA27D92E8b30b2C58ed07f9E20001"
      abi: x402ExactPermit2Proxy
      startBlock: 43098000
    mapping:
      kind: ethereum/events
      apiVersion: 0.0.7
      language: wasm/assemblyscript
      entities:
        - X402Payment
        - X402AddressSummary
        - X402DailyStats
        - Facilitator
      abis:
        - name: x402ExactPermit2Proxy
          file: ./abis/x402ExactPermit2Proxy.json
      eventHandlers:
        - event: Settled()
          handler: handleSettled
          receipt: true
        - event: SettledWithPermit()
          handler: handleSettledWithPermit
          receipt: true
      file: ./src/permit2proxy.ts
